<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QuickPDF PNL Mobile</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F07D00">
<style>
:root{--orange:#f07d00;--dark:#374151;--line:#e5e7eb;--light:#f9fafb;--muted:#6b7280;--err:#dc2626;--ok:#16a34a}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:#111827;background:#fff}
header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:10px 12px;display:flex;align-items:center;gap:10px}
h1{font-size:16px;margin:0;flex:1}.logo{height:38px;max-width:140px;object-fit:contain}
main{padding:12px;display:grid;gap:12px}.card{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.actions,.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}button,.filebtn{border:0;border-radius:10px;padding:11px;font-weight:700;font-size:14px;text-align:center}.primary{background:var(--orange);color:#fff}.dark{background:var(--dark);color:#fff}.light{background:#f3f4f6;color:#111;border:1px solid var(--line)}
input[type=file]{display:none}input,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:14px}label.small{font-size:12px;color:var(--muted);font-weight:700}.field{display:grid;gap:4px}.meta{font-size:12px;color:var(--muted)}
.list{display:grid;gap:6px;max-height:300px;overflow:auto}.item{border:1px solid var(--line);border-radius:10px;padding:9px;display:grid;grid-template-columns:26px 1fr;gap:8px;font-size:13px;background:#fff}.item.selected{border-color:var(--orange);background:#fff7ed}.item.invalid{border-color:#fca5a5;background:#fff1f2}.ok{color:var(--ok);font-weight:800}.err{color:var(--err);font-weight:800}
.pnl{height:380px;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:Consolas,monospace;font-size:12px;white-space:pre;overflow:auto;background:var(--light)}.badline{background:#fca5a5;color:#7f1d1d;display:block}
.notice{border-left:4px solid var(--orange);background:#fff7ed;padding:10px;border-radius:8px;font-size:13px}.footer{text-align:center;color:var(--muted);font-size:11px;padding:12px}
@media(min-width:900px){main{grid-template-columns:370px 1fr;align-items:start}.right{position:sticky;top:70px}}
</style>
</head>
<body>
<header><h1>QuickPDF PNL Mobile</h1><img class="logo" src="alyzia_logo.png" onerror="this.src='icon.svg'" alt="Alyzia"></header>
<main>
<section>
<div class="card"><label for="pdfInput" class="filebtn primary">+ Ajouter PDF</label><input id="pdfInput" type="file" accept="application/pdf,.pdf" multiple><p id="count" class="meta">0 PDF · 0 PAX</p>
<div class="actions"><button class="dark" id="exportAll">Exporter tout</button><button class="dark" id="exportSel">Exporter sélection</button><button class="light" id="copy">Copier PNL</button><button class="light" id="share">Partager</button></div></div>
<div class="card grid"><div class="field"><label class="small">Vol</label><input id="flight"></div><div class="field"><label class="small">Date</label><input id="date"></div><div class="field"><label class="small">Origine</label><input id="origin"></div><div class="field"><label class="small">Destination</label><input id="dest"></div></div>
<div class="card"><div class="field"><label class="small">Recherche</label><input id="search" placeholder="Vol, PNR, nom, SSR..."></div><div class="field" style="margin-top:8px"><label class="small">Tri</label><select id="sort"><option value="time_asc">Heure ↑</option><option value="time_desc">Heure ↓</option><option value="pax_desc">PAX ↓</option><option value="pax_asc">PAX ↑</option><option value="name_asc">Nom A-Z</option></select></div></div>
<div class="card"><strong>PDF chargés</strong><div id="list" class="list"></div></div>
<div class="notice">Version mobile test : génération, contrôle, export, copie et partage. Pas d’envoi Outlook automatique.</div>
</section>
<section class="right card"><strong>PNL générée</strong><p id="info" class="meta">Aucune PNL sélectionnée.</p><div id="pnl" class="pnl"></div></section>
</main>
<div class="footer">© 2026 ALYZIA - QuickPDF PNL Mobile - Internal use only</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";}
const M={"01":"JAN","02":"FEB","03":"MAR","04":"APR","05":"MAY","06":"JUN","07":"JUL","08":"AUG","09":"SEP","10":"OCT","11":"NOV","12":"DEC"};
const Z=new Set(["ZONA","ZONB","ZONC"]);const ASVC=new Set(["FBEA","FBEB","FBEC","FBED","ZONA","ZONB","ZONC","5B15","5B17","5B20","5B23","5B25","5B30","CLUG","FAST","MAX","INF"]);
let S={items:[],sel:null};const $=id=>document.getElementById(id);
function norm(s){return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[’'-]/g," ").replace(/\s+/g," ").trim()}
function cleanName(s){return norm(s).toUpperCase().replace(/[^A-Z\s]/g," ").replace(/\s+/g," ").trim()}
function txt(v){let s=String(v??"").trim();return(!s||["nan","none","null"].includes(s.toLowerCase()))?"":s}
function seat(v){let m=txt(v).toUpperCase().match(/\b(\d{1,3}[A-Z])\b/);return m?m[1]:""}
function pnr(v){return txt(v).toUpperCase().replace(/[\s-]/g,"")}
function dob(v){let s=txt(v).toUpperCase(),m=s.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{2}|\d{4})$/);if(m)return `${String(+m[1]).padStart(2,"0")}${M[String(+m[2]).padStart(2,"0")]||""}${m[3].slice(-2)}`;return ""}
function ssrs(raw){return(txt(raw).toUpperCase().match(/\b(?:5B\d{2}|ZON[ABC]|\d{2}KG|[A-Z0-9]{3,4})\b/g)||[]).filter((x,i,a)=>a.indexOf(x)===i)}
function ssrLine(c){if(c==="INAD")return`.R/${c} HK1`;if(c.startsWith("5B")||Z.has(c)||ASVC.has(c))return`.R/ASVC HK1 ${c}`;return`.R/${c} HK1`}
function splitMerged(last,first){last=txt(last);first=txt(first);if(first||!last)return[last,first];let w=last.split(/\s+/),t=w.at(-1)||"",m=t.match(/^([A-ZÀ-Ü]{2,})([A-ZÀ-Ü][a-zà-ÿ][A-Za-zÀ-ÿ]+)$/);return m?[[...w.slice(0,-1),m[1]].join(" "),m[2]]:[last,first]}
function issue(r){let [l,f]=splitMerged(r.last,r.first);l=cleanName(l);if(!l&&!cleanName(f))return"nom et prénom manquants ou illisibles";if(!l)return"nom manquant ou illisible";return""}
function nameLine(r){let [l,f]=splitMerged(r.last,r.first);l=cleanName(l)||norm(l).toUpperCase();f=cleanName(f)||norm(f).toUpperCase();if(l&&f)return`1${l}/${f}`;if(l)return`1${l}`;if(f)return`1/${f}`;return"1"}
async function pdfText(file){if(!window.pdfjsLib)throw Error("PDF.js non chargé");let pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise,full="";for(let i=1;i<=pdf.numPages;i++){let p=await pdf.getPage(i),c=await p.getTextContent(),items=c.items.map(x=>({s:x.str,x:x.transform[4],y:x.transform[5]})).sort((a,b)=>b.y-a.y||a.x-b.x),ly=null,line=[];for(let it of items){if(ly===null||Math.abs(it.y-ly)<3){line.push(it.s);ly=it.y}else{full+=line.join(" ")+"\n";line=[it.s];ly=it.y}}if(line.length)full+=line.join(" ")+"\n"}return full}
function params(text,file){let u=text.toUpperCase(),n=file.toUpperCase(),p={flight:"",date:"",origin:"",dest:"",time:""};let m=u.match(/\b([A-Z]{2})\s*(\d{3,4}[A-Z]?)\b/);if(m)p.flight=m[1]+m[2];m=u.match(/D[ÉE]PART\/ARRIV[ÉE]E\s*:\s*([A-Z]{3})\/([A-Z]{3})/);if(m){p.origin=m[1];p.dest=m[2]}m=u.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2})[:H](\d{2})/);if(m){p.date=`${String(+m[1]).padStart(2,"0")}${M[String(+m[2]).padStart(2,"0")]}`;p.time=`${String(+m[4]).padStart(2,"0")}:${m[5]}`}m=n.match(/\b([A-Z]{3})([A-Z]{3})([A-Z0-9]{2}\d{3,4}[A-Z]?)/);if(m){p.origin||=m[1];p.dest||=m[2];p.flight||=m[3]}return p}
function parseRows(text){let rows=[],rx=/^(\d{1,4})\s+(.+?)\s+([A-Z0-9]{6})\s+(\S+)\s+\d+\s+(?:CheckedIn|Default|Boarded|NoShow)?\s*(\d{1,2}[/-]\d{1,2}[/-]\d{2,4})\s*(.*?)\s+(\d{5,})?$/i;for(let l of text.split(/\n+/).map(x=>x.trim()).filter(Boolean)){if(/^(Dernière|Derniere|Départ|Depart|Liste|# Last|Page)/i.test(l))continue;let m=l.match(rx);if(!m)continue;let parts=m[2].split(/\\s+/),ep=parts.findIndex(p=>["EP","EPOUSE","ÉPOUSE"].includes(p.toUpperCase())),last="",first="";if(ep>=0&&parts.length>=ep+3){last=parts.slice(0,ep+3).join(" ");first=parts.slice(ep+3).join(" ")}else{last=parts[0]||"";first=parts.slice(1).join(" ")}rows.push({seq:m[1],last,first,pnr:m[3],seat:m[4],dob:m[5],ssr:m[6]||""})}let map=new Map(rows.map(r=>[r.seq,r]));return[...map.values()].sort((a,b)=>+a.seq-+b.seq)}
function gen(item){let p=item.params,L=["PNL",`${p.flight}/${p.date} ${p.origin} PART1`,`-${p.dest}${String(item.rows.length).padStart(3,"0")}Y`];item.bad=[];for(let r of item.rows){let line=L.length+1;L.push(nameLine(r));if(issue(r))item.bad.push(line);let st=seat(r.seat),d=dob(r.dob);if(st)L.push(`.R/SEAT HK1 ${st}`);L.push(".R/ETLP HK1 1111111111111");if(d)L.push(`.R/DOCS HK1/////${d}`);for(let s of ssrs(r.ssr))L.push(ssrLine(s));let pr=pnr(r.pnr);if(pr)L.push(`.L/${pr}`)}L.push("ENDPNL");item.pnl=L.join("\n");item.invalid=item.rows.filter(issue).map(r=>({row:r,issue:issue(r)}));item.status=item.invalid.length?"invalid":"ok"}
async function add(files){for(let f of files){try{let t=await pdfText(f),it={file:f.name,text:t,params:params(t,f.name),rows:parseRows(t),pnl:"",bad:[]};gen(it);S.items.push(it)}catch(e){S.items.push({file:f.name,params:{},rows:[],pnl:"",bad:[],status:"invalid",invalid:[{row:{seq:"?"},issue:e.message}]})}}if(S.sel===null&&S.items.length)S.sel=0;render();show()}
function render(){let q=$("search").value.toUpperCase(),mode=$("sort").value;S.items.sort((a,b)=>mode==="time_desc"?(b.params.time||"99:99").localeCompare(a.params.time||"99:99"):mode==="pax_desc"?b.rows.length-a.rows.length:mode==="pax_asc"?a.rows.length-b.rows.length:mode==="name_asc"?a.file.localeCompare(b.file):(a.params.time||"99:99").localeCompare(b.params.time||"99:99"));let list=$("list");list.innerHTML="";S.items.forEach((it,i)=>{let blob=`${it.file} ${it.params.flight} ${it.params.date} ${it.pnl}`.toUpperCase();if(q&&!blob.includes(q))return;let d=document.createElement("div");d.className=`item ${it.status==="invalid"?"invalid":""} ${S.sel===i?"selected":""}`;d.onclick=()=>{S.sel=i;render();show()};d.innerHTML=`<div class="${it.status==="invalid"?"err":"ok"}">${it.status==="invalid"?"✗":"✓"}</div><div><strong>${it.params.time||"--:--"} ${it.params.flight||"VOL?"} ${it.params.date||"DATE?"}</strong><br>${it.rows.length} pax ${it.status==="invalid"?" · invalide":""}</div>`;list.appendChild(d)});$("count").textContent=`${S.items.length} PDF · ${S.items.reduce((n,i)=>n+i.rows.length,0)} PAX`}
function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
function show(){let it=S.items[S.sel];if(!it){$("info").textContent="Aucune PNL sélectionnée.";$("pnl").textContent="";return}$("flight").value=it.params.flight||"";$("date").value=it.params.date||"";$("origin").value=it.params.origin||"";$("dest").value=it.params.dest||"";$("pnl").innerHTML=it.pnl.split("\n").map((l,i)=>it.bad.includes(i+1)?`<span class="badline">${esc(l)}</span>`:esc(l)).join("\n");$("info").textContent=it.invalid?.length?`⚠ passager ${it.invalid[0].row.seq} invalide : ${it.invalid[0].issue}`:`${it.rows.length} passager(s) extrait(s)`}
function download(name,text){let b=new Blob([text],{type:"text/plain;charset=utf-8"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function exportItems(items,name){if(!items.length)return alert("Aucune PNL.");download(name,items.map(i=>i.pnl.trim()).join("\n============================================================\n"))}
$("pdfInput").onchange=e=>add(e.target.files);$("exportAll").onclick=()=>exportItems(S.items,"PNL_export_tout.txt");$("exportSel").onclick=()=>exportItems(S.sel!==null?[S.items[S.sel]]:[],"PNL_selection.txt");$("copy").onclick=async()=>{let it=S.items[S.sel];if(!it)return alert("Aucune PNL.");await navigator.clipboard.writeText(it.pnl);alert("PNL copiée.")};$("share").onclick=async()=>{let it=S.items[S.sel];if(!it)return alert("Aucune PNL.");if(navigator.share){await navigator.share({title:"PNL",text:it.pnl}).catch(()=>{})}else{await navigator.clipboard.writeText(it.pnl);alert("PNL copiée.")}};$("search").oninput=render;$("sort").onchange=render;
["flight","date","origin","dest"].forEach(id=>$(id).oninput=()=>{let it=S.items[S.sel];if(!it)return;it.params[id]=$(id).value.toUpperCase();gen(it);render();show()});
if("serviceWorker"in navigator)navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
</script>
</body>
</html>
